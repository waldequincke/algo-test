# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8084}

# ── Virtual Threads ───────────────────────────────────────────────────────────
# Configures Spring-managed executors (e.g. @Async, task scheduler) to use
# virtual threads. For WebFlux + Netty, blocking BFS is explicitly dispatched
# to the virtual-thread Scheduler in TreeResource — this is the Spring-wide default.
spring.threads.virtual.enabled=true

# ── Security constraints (overridable via environment variables) ──────────────
tree.max-depth=${TREE_MAX_DEPTH:500}
tree.max-nodes=${TREE_MAX_NODES:10000}

# ── Actuator (mirrors Quarkus /q/health) ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── OpenAPI / Swagger UI (mirrors Quarkus /q/swagger-ui) ─────────────────────
springdoc.swagger-ui.path=/q/swagger-ui
springdoc.api-docs.path=/q/openapi

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.example=WARN
